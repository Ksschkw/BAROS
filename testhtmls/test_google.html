<!DOCTYPE html>
<html>
<head>
    <title>Test Google Sign-In</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <h1>Test Google Auth for BAROS</h1>
    <div id="g_id_onload"
         data-client_id="327086278133-gckbh6h9gj5qscebslq239kp1hkjtq07.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard"></div>
    <div id="result"></div>

    <script>
        async function handleCredentialResponse(response) {
            const idToken = response.credential;
            document.getElementById('result').innerText = 'Got token, sending to backend...';
            try {
                const res = await fetch('http://localhost:8000/api/v1/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: idToken }),
                    credentials: 'include'
                });
                const data = await res.json();
                document.getElementById('result').innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById('result').innerText = 'Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
