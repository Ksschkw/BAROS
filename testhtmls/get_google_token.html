<!DOCTYPE html>
<html>
<head>
    <title>Get Google Token for Linking</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <h1>Step 2: Get a Google ID Token</h1>
    <p>After signing in, the token will appear below. Copy it and paste it into Swagger.</p>
    <div id="g_id_onload"
         data-client_id="327086278133-gckbh6h9gj5qscebslq239kp1hkjtq07.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard"></div>
    <div id="tokenDisplay" style="word-break: break-all; margin-top: 20px; padding: 10px; background: #f0f0f0; border: 1px solid #ccc;"></div>

    <script>
        function handleCredentialResponse(response) {
            const idToken = response.credential;
            document.getElementById('tokenDisplay').innerText = 'Your token:\n' + idToken;
        }
    </script>
</body>
</html>
